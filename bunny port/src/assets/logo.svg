<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f5"/>
    </linearGradient>

    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff1a1a"/>
      <stop offset="50%" stop-color="#ff4b2b"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#d32f2f" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded background card -->
  <rect x="80" y="80" width="640" height="640" rx="140" ry="140" fill="url(#bgGrad)" />

  <!-- Accent ring -->
  <circle cx="400" cy="400" r="250" fill="none" stroke="#ffebee" stroke-width="40"/>
  <circle cx="400" cy="400" r="230" fill="none" stroke="#ffcdd2" stroke-width="18" stroke-linecap="round"
           stroke-dasharray="90 40"/>

  <!-- Letter D -->
  <text x="50%" y="52%" text-anchor="middle" dominant-baseline="middle"
        font-family="Poppins, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-weight="800" font-size="360"
        fill="url(#textGrad)" filter="url(#softShadow)" letter-spacing="8">
    D
  </text>
</svg>
